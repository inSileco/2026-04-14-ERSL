project:
  type: website
  output-dir: _site

website:
  title: "RASL Knowledge Management"

execute:
  echo: true

format:
  revealjs:
    theme: [default, custom.scss]
    slide-number: true
    transition: fade
    highlight-style: arrow
    css: styles.css
    incremental: false
    toc: false
    toc-depth: 2
    code-block-bg: "#f8f8f8"
    code-block-border-left: "#37abc8"
    logo: img/main.svg
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

